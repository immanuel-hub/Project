<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>action</title>
</head>
<style>
     .nav{
        display:flex;
        flex-wrap: wrap;
        justify-content: center;
        background-color:rgba(31, 58, 95, 0.95);
        padding:20px;
        gap: 20px;
    
    }
    .nav a{
        margin:0 5%;
        text-decoration: none;
        color:#D9A441;
        font-size: 20px;
        font-weight: bold;
        font-family:Verdana, Geneva, Tahoma, sans-serif;
        transition: 0.3s ease;
    }
    .nav a:hover{
        color: rgb(255, 255, 255);
        background-color: rgba(255, 255, 255, 0.15);
        border-radius: 5px;
        padding: 5px 10px;
    }
    body{
        background-color:  #F5E9DA;
        font-family: Arial, Helvetica, sans-serif;
    }
    .page{
    width: 90%;
    max-width: 1000px;
    margin: 40px auto;
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.section{
    background-color:#1F3A5F;
    padding: 25px;
    border-radius: 12px;
    box-shadow:0 8px 20px rgba(0, 0, 0, 0.25);
    transition: 0.3s ease;
}

.section:hover{
    transform: scale(1.03);
}

.section h2, .section h3{
    color:#D9A441;
    text-align:center;
    font-family:'Times New Roman', Times, serif;
    margin-bottom:15px;
}

.section p, .section li, .section label{
    color:#F5E9DA;
    font-family:Verdana, Geneva, Tahoma, sans-serif;
    line-height:1.6;
}

input, select, textarea{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:12px;
    font-size:16px;
}

button{
    background-color:#D9A441;
    color:#1F3A5F;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s ease;
}

button:hover{
    background-color:#F5E9DA;
}

#items-container div{
    background-color:#F5E9DA;
    color:#1F3A5F;
    border-radius:10px;
    padding:15px;
    margin-top:10px;
}

#items-container h3{
    color:#1F3A5F;
}
  
    </style>
    
<body>
    <div class="nav">

        <a href="index.html">Home</a>
        <a href="About Us.html">About Us</a>
        <a href="action.html">Action</a>
        <a href="contact.html">Contact</a>
    </div> 
    <div class="page">
        <div class="section">
     <h2>Payments and bookings</h2>
    <p>Choose an item, book it, pay via M-Pesa</p>
    
    <hr>

    <h3>Steps to Follow</h3>
    <ol>
        <li>View item</li>
        <li>Click Book</li>
        <li>Pay via M-Pesa</li>
    </ol>
    </div>
    <hr>

    <div class="section">
    <h3>Search For An Item</h3>
    <input type="text" id="search" placeholder="Search item">
     
    <br><br>

    <label>category</label>
    <select id="category">
        <option>All</option>
        <option>Furniture</option>
        <option>Electronics</option>
    </select>
    </div>

    <hr>

    <div class="section">
    <h2>Available Items</h2>
    <div id="items-container"></div>
    </div>
        
    <hr>
   
    <div class="section">
    <h2>Add Item</h2>

    <form action="#" method="post">
        <label>Item Name:</label><br>
        <input type="text" id="itemName"><br><br>
        <label>Category:</label><br>
        <input type="text" id="itemcategory"><br><br>
        <label>Price:</label><br>
        <input type="number" id="itemPrice"><br><br>
 b      <label>Exchange Option</label><br>
        <input type="text"  id="itemExchange" placeholder="what would you accept in exchange?"><br><br>
        <label>Description:</label><br>
        <textarea id="itemDescription"></textarea><br><br>
 
        <button type="submit">Save Item</button>
    </form>
    </div>


    <hr>

    <div class="section">
    <h2>Booking</h2>

    <form id="bookingForm">
    <label>Full Name:</label>
    <input type="text" id="fullName"><br><br>
    <label>Phone Number:</label>
    <input type="text" id="phone"><br><br>
    <label>Quantity:</label>
    <input type="number" id="quantity" value="1"><br><br>
    <button type="submit">Confirm</button>
</form>
</div>
<div id="formMessage" style="text-align:center; margin-bottom:15px;"></div>
    <script src="script.js"></script>
</body>
</html>
