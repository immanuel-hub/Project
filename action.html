     <h2>Payments and bookings</h2>
    <p>Choose an item, book it, pay via M-Pesa</p>
    
    <hr>

    <h3>Steps to Follow</h3>
    <ol>
        <li>View item</li>
        <li>Click Book</li>
        <li>Pay via M-Pesa</li>
    </ol>

    <hr>

    <h3>Search For An Item</h3>
    <input type="text" id="search" placeholder="Search item">
     
    <br><br>

    <label>category</label>
    <select id="category">
        <option>All</option>
        <option>Furniture</option>
        <option>Electronics</option>
    </select>

    <hr>

    <h2>Available Items</h2>
    <div id="items-container"></div>
        
    <hr>

    <h2>Add Item</h2>

    <form action="#" method="post">
        <label>Item Name:</label><br>
        <input type="text" id="itemName"><br><br>
        <label>Category:</label><br>
        <input type="text" id="itemcategory"><br><br>
        <label>Price:</label><br>
        <input type="number" id="itemPrice"><br><br>
 b      <label>Exchange Option</label><br>
        <input type="text"  id="itemExchange" placeholder="what would you accept in exchange?"><br><br>
        <label>Description:</label><br>
        <textarea id="itemDescription"></textarea><br><br>
 
        <button type="submit">Save Item</button>
    </form>

    <hr>

    <h2>Booking</h2>

    <form id="bookingForm">
    <label>Full Name:</label>
    <input type="text" id="fullName"><br><br>
    <label>Phone Number:</label>
    <input type="text" id="phone"><br><br>
    <label>Quantity:</label>
    <input type="number" id="quantity" value="1"><br><br>
    <button type="submit">Confirm</button>
</form>
<div id="formMessage" style="text-align:center; margin-bottom:15px;"></div>
    <script src="script.js"></script>
